<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Admin • WeddingEla.gr</title>

  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest-admin.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <meta name="theme-color" content="#c6a86b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="WeddingEla">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <style>
    .contactEmail{ font-size:.92em; opacity:.75; }

    /* κάνε τα ονόματα να μη φουσκώνουν το ύψος */
    .couple div{ line-height:1.15; }
    .couple div:first-child{ font-weight:700; }
    .couple div:last-child{ opacity:.8; }

    /* ✅ ΠΑΝΤΑ 2 σειρές */
    .actionsGrid{
      display:grid;
      grid-template-columns:max-content max-content max-content;
      grid-template-areas:
        "form rsvp paid"
        "inv  partner del";
      gap:4px 6px;
      align-items:center;

      overflow-x:auto;
      overflow-y:hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .actionsGrid::-webkit-scrollbar{ display:none; }

    .btnForm{grid-area:form;}
    .btnRSVP{grid-area:rsvp;}
    .btnPaid{grid-area:paid; justify-self:end;}
    .btnInv{grid-area:inv;}
    .btnPartner{grid-area:partner; justify-self:center;}
    .btnDel{grid-area:del; justify-self:end;}

    .actionsGrid .btn{
      width:fit-content;
      padding:4px 8px;
      font-size:.88em;
      line-height:1.1;
      border-radius:6px;
      white-space:nowrap; /* ✅ να μη σπάει το κείμενο */
    }

    .crmStats{
      display:flex;
      align-items:center;
      gap:24px;
      margin:14px 0 10px;
      flex-wrap:wrap;
      font-size:1rem;
    }

    .crmStat{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:0;
      border:none;
      border-radius:0;
      background:none;
      font-size:1rem;
      transition:opacity .18s ease, transform .18s ease;
    }

    .crmStat[onclick]{
      cursor:pointer;
    }

    .crmStat[onclick]:hover{
      opacity:.72;
      transform:translateY(-1px);
    }

    .crmStat span{
      font-size:1.05rem;
    }

    .crmStat strong{
      font-size:1.05rem;
      font-weight:800;
    }

    @media (max-width:700px){
      .crmStats{
        gap:16px;
      }
    }
  </style>
</head>

(async () => {

  const VAPID_PUBLIC_KEY = "BOCJtoX3Cddmn_HGCDzGkVQenylicDxklm3rMjBiFd8Zu8Q1R_95LXKxR52H1fk_4SuIxO8DvH7LZVK9L8gM56g";

let price_a = 85;

  const adminKeyEl  = $("adminKey");

let ADMIN_SESSION = localStorage.getItem("ADMIN_SESSION") || "";

    el.textContent = msg;
    el.className = "hint " + (ok ? "" : "bad");
  };
  const setLogin = (msg, ok = true) => hint(loginStatus, msg, ok);
  const setCreate= (msg, ok = true) => hint(createStatus, msg, ok);

  const setAuthUI = (logged) => {
    loginCard.style.display = logged ? "none" : "";
    panel.style.display     = logged ? "" : "none";
    btnLogoutTop.style.display = logged ? "" : "none";
    btnLogin.style.display  = logged ? "none" : "";
  };

  const fmtDMY = (iso) => {
    if (!iso) return "—";
    const m = String(iso).match(/^(\d{4})-(\d{2})-(\d{2})$/);
    return m ? `${Number(m[3])}-${Number(m[2])}-${m[1]}` : iso;
  };

  const coupleHTML = (groom, bride) => {
    const g = (groom || "").trim();
    const b = (bride || "").trim();
    if (g && b) return `<div class="couple"><div>${g}</div><div>${b}</div></div>`;
    return g || b || "—";
  };

  const safeAttr = (s) => String(s || "").replace(/"/g, "&quot;");
  const payLink = (amount) => `https://mypos.com/@MonteCristoEvents/${amount}`;

  async function api(path, opts = {}) {
    const headers = { "content-type": "application/json", ...(opts.headers || {}) };
    if (ADMIN_SESSION) headers.authorization = "Bearer " + ADMIN_SESSION;

    const res = await fetch(API(path), { ...opts, headers });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data?.error || `HTTP ${res.status}`);
    return data;
  }

function handle401(e) {
  const msg = String(e?.message || "");

  if (msg.includes("401") || msg.toLowerCase().includes("unauthor")) {
    ADMIN_SESSION = "";
    localStorage.removeItem("ADMIN_SESSION");
    setAuthUI(false);
    setLogin("Session έληξε. Ξανακάνε login.", false);
    return true;
  }

  return false;
}

	  <button
  	  class="btn ${paid_amount == null ? "primary" : "ghost"} btnPaid"

  	  data-paid-toggle="${tok}"

      ${i ? `<a class="btn soft btnInv" target="_blank" rel="noopener" href="${i}">Invit.</a>` : `<span></span>`}
	  ${pref ? `<span class="btn soft btnPartner" title="${safeAttr(partner_name || pref)}">${pref}</span>` : `<span></span>`}

}

function renderList(items) {
  if (!items.length) {
    rowsEl.innerHTML = `<tr><td colspan="3" class="muted">Δεν βρέθηκαν εγγραφές.</td></tr>`;
    return;
  }

  // 24/1/26
  const fmtDMYshort = (iso) => {
    if (!iso) return "—";
    const m = String(iso).match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (!m) return iso;
    const yy = m[1].slice(2);           // 2026 -> 26
    return `${Number(m[3])}/${Number(m[2])}/${yy}`;
  };

  rowsEl.innerHTML = items.map(it => {
    const couple = coupleHTML(it.couple?.groom_name, it.couple?.bride_name);
    const date   = fmtDMYshort(it.wedding_date);
    const phone  = it.phone || "—";
    const email  = it.email || "—";

    return `
      <tr>
        <td>
          <div class="contactEmail">${date}</div>
          ${couple}
        </td>
        <td>
          <div>${phone}</div>
          <div class="contactEmail">${email}</div>
        </td>
        <td>${
  it.kind === "lead"
  ? actionsLeadHTML(it.lead_id, it.partner_ref)
  : actionsHTML(it.urls, it.form_token, it.paid_amount, it.partner_ref, it.partner_name)
}</td>
      </tr>
    `;
  }).join("");
}

  async function refreshList() {
    if (!ADMIN_SESSION) {
      rowsEl.innerHTML = `<tr><td colspan="4" class="muted">Κάνε login για να δεις τη λίστα.</td></tr>`;
      return;
    }
    rowsEl.innerHTML = `<tr><td colspan="4" class="muted">Loading…</td></tr>`;
    const data = await api("/api/admin/list", { method: "GET" });
    const stats = data.stats || {};

$("stat-leads").textContent = stats.leads ?? 0;
$("stat-events").textContent = stats.events ?? 0;
$("stat-paid").textContent = stats.paid ?? 0;
$("stat-partners").textContent = stats.partners ?? 0;
$("stat-archived").textContent = stats.archived_paid ?? 0;
	const items = [...(data.items || [])].sort((a, b) => {
  	const aLead = a.kind === "lead";
  	const bLead = b.kind === "lead";

  // 1) πρώτα τα leads
  if (aLead && !bLead) return -1;
  if (!aLead && bLead) return 1;

// 2) leads μεταξύ τους: κράτα τη σειρά όπως έρχεται από το API
if (aLead && bLead) {
  return 0;
}

  // 3) events μεταξύ τους: παλιότερη ημερομηνία γάμου πρώτα
  const ad = String(a.wedding_date || "9999-12-31");
  const bd = String(b.wedding_date || "9999-12-31");
  return ad.localeCompare(bd);
});

renderList(items);
await syncBadgeFromList(items);
  }

  async function login() {
    const pw = (adminKeyEl.value || "").trim();
    if (!pw) return setLogin("Βάλε password.", false);

    setLogin("Logging in…", true);

    try {
      const res = await fetch(API("/api/admin/login"), {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ password: pw })
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data?.error || `HTTP ${res.status}`);

      ADMIN_SESSION = String(data.session_token || "").trim();
      if (!ADMIN_SESSION) throw new Error("No session token returned");
      localStorage.setItem("ADMIN_SESSION", ADMIN_SESSION);

      setAuthUI(true);
      setLogin("OK ✅", true);
      await refreshList();
    } catch (e) {
      ADMIN_SESSION = "";
      setAuthUI(false);
      setLogin(e.message || "Login failed", false);
    }
  }

function logout() {
  ADMIN_SESSION = "";
  localStorage.removeItem("ADMIN_SESSION");
  adminKeyEl.value = "";
  setAuthUI(false);
  setLogin("Logged out.", true);
  rowsEl.innerHTML = "";
}

async function deleteEventFlow(formToken, btn) {
  if (!ADMIN_SESSION) return setCreate("Κάνε login πρώτα.", false);
  if (!formToken) return setCreate("Λείπει form_token.", false);

  const step1 = confirm(
`Διαγραφή event:

OK     → Archive (ασφαλές, μπορεί να επανέλθει)
Cancel → Hard delete επιλογή`
  );

  let mode = "archive";
  if (!step1) {
    const hard = confirm("Hard delete = ΟΡΙΣΤΙΚΗ διαγραφή.\nΔεν μπορεί να επανέλθει.\n\nΣυνέχεια;");
    if (!hard) return;
    mode = "hard";
  }

  const tr = btn?.closest("tr") || null;

  try {
    setCreate(mode === "archive" ? "Archiving…" : "Deleting permanently…", true);

    await api("/api/admin/delete", {
      method: "POST",
      body: JSON.stringify({ form_token: formToken, mode })
    });

    setCreate(mode === "archive" ? "Archived ✅" : "Deleted permanently ✅", true);

    // ✅ remove only this row (no full refresh)
    tr?.remove();

    // ✅ αν δεν έμεινε τίποτα, βάλε το empty row
    if (!rowsEl.querySelector("tr")) {
      rowsEl.innerHTML = `<tr><td colspan="4" class="muted">Δεν βρέθηκαν εγγραφές.</td></tr>`;
    }

  } catch (e) {
    if (!handle401(e)) setCreate(e.message || "Delete failed", false);
  }
}

async function togglePaid(btn) {
  const formToken = btn.getAttribute("data-paid-toggle") || "";

  const currentText = btn.textContent?.trim() || "";
  const currentIsPaid = currentText !== "" && currentText !== "Not Paid";

  const input = prompt(
    currentIsPaid
      ? `Τωρινό ποσό: ${currentText}\nΒάλε νέο ποσό (0-500) ή άφησε κενό για Not Paid`
      : `Βάλε ποσό (0-500) ή άφησε κενό για Not Paid`,
    currentIsPaid ? currentText : ""
  );

  if (input === null) return; // cancel

  const v = String(input).trim();

  let paid_amount = null;

  if (v !== "") {
    const n = Number(v);
    if (!Number.isInteger(n) || n < 0 || n > 500) {
      alert("Δεκτός ακέραιος αριθμός 0-500 ή κενό για Not Paid.");
      return;
    }
    paid_amount = n;
  }

  try {
    const res = await api("/api/admin/paid", {
      method: "POST",
      body: JSON.stringify({
        form_token: formToken,
        paid_amount
      })
    });

    btn.textContent = paid_amount == null ? "Not Paid" : String(paid_amount);

	btn.classList.toggle("primary", paid_amount == null);
	btn.classList.toggle("ghost", paid_amount != null);

  } catch (e) {
    if (!handle401(e))
      alert("Paid update failed");
  }
}

  btnLogin.addEventListener("click", login);
  btnLogoutTop?.addEventListener("click", logout);
  btnPay85?.addEventListener("click", openPayEmail);
  btnCreate.addEventListener("click", createTokens);
  btnEnablePush?.addEventListener("click", enablePush);

async function enablePush() {

  try {
    if (!('Notification' in window)) {
      alert("Αυτός ο browser δεν υποστηρίζει notifications.");
      return;
    }

    if (!('serviceWorker' in navigator)) {
      alert("Δεν βρέθηκε service worker.");
      return;
    }

const permission = await Notification.requestPermission();

if (permission !== "granted") {
  alert("Δεν δόθηκε άδεια για ειδοποιήσεις.");
  return;
}

const reg = await navigator.serviceWorker.ready;

let sub = await reg.pushManager.getSubscription();

if (!sub) {
  sub = await reg.pushManager.subscribe({
    userVisibleOnly: true,
    applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)

function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);

  for (let i = 0; i < rawData.length; ++i) {
    outputArray[i] = rawData.charCodeAt(i);
  }
  return outputArray;
}

async function syncBadgeFromList(items = []) {
  try {
    if (!('setAppBadge' in navigator) || !('clearAppBadge' in navigator)) return;

    const pending = items.filter(it => it.kind === "lead").length;

    if (pending > 0) {
      await navigator.setAppBadge(pending);
    } else {
      await navigator.clearAppBadge();
    }
  } catch (e) {
    console.error("syncBadgeFromList failed", e);
  }
}

btnPricesSave?.addEventListener("click", async () => {
  try {
    const dlg = document.getElementById("dlgPrices");

    const aStr = ($("price_a")?.value || "").trim();
    const bStr = ($("price_b")?.value || "").trim();
    const cStr = ($("price_c")?.value || "").trim();

    const a = Number(aStr.replace(",", "."));
    const b = Number(bStr.replace(",", "."));
    const c = Number(cStr.replace(",", "."));

    // validation: 0..500, real numbers allowed
    const bad =
      !Number.isFinite(a) || a < 0 || a > 500 ||
      !Number.isFinite(b) || b < 0 || b > 500 ||
      !Number.isFinite(c) || c < 0 || c > 500;

    if (bad) {
      pricesHint.textContent = "Βάλε αριθμούς 0–500 (επιτρέπονται δεκαδικά).";
      pricesHint.className = "hint bad";
      return;
    }

    // Save to server
    const saved = await api("/api/admin/prices", {
      method: "POST",
      body: JSON.stringify({ price_a: a, price_b: b, price_c: c })
    });

    pricesHint.textContent = `OK ✅ ${saved.price_a} | ${saved.price_b} | ${saved.price_c}`;
    pricesHint.className = "hint";

    // close dialog (if supported)
    if (dlg && typeof dlg.close === "function") dlg.close();

  } catch (e) {
    if (!handle401(e)) {
      pricesHint.textContent = e?.message || "Σφάλμα αποθήκευσης";
      pricesHint.className = "hint bad";
    }
  }
